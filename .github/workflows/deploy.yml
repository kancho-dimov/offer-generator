name: Build & Deploy

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: offer-generator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log build success
        run: |
          echo "✅ Docker image pushed to:"
          echo "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "To deploy to your server via SSH, add a deployment step."
          echo "See deployment instructions comment in this workflow."

